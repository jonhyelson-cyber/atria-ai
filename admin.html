
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Atria AI — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #080810;
  --surface:  #0f0f1a;
  --surface2: #141422;
  --border:   rgba(255,255,255,0.06);
  --cyan:     #00d4d4;
  --purple:   #9b7fff;
  --green:    #00e676;
  --orange:   #ffaa44;
  --red:      #ff5252;
  --text:     #f0f0f5;
  --muted:    #6b6b80;
  --font:     'DM Sans', sans-serif;
  --mono:     'JetBrains Mono', monospace;
}

body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.login-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 48px; width: 100%; max-width: 380px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5);
}
.login-logo {
  font-family: var(--mono); font-size: 22px; font-weight: 600;
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
}
.login-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; }
.login-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; }
.login-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px; color: var(--text);
  font-family: var(--mono); font-size: 14px; outline: none;
  transition: border-color 0.2s; margin-bottom: 20px;
}
.login-input:focus { border-color: var(--cyan); }
.login-btn {
  width: 100%; padding: 13px; border-radius: 10px; border: none;
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  color: #000; font-weight: 700; font-size: 14px; cursor: pointer;
  font-family: var(--font); transition: opacity 0.2s;
}
.login-btn:hover { opacity: 0.9; }
.login-err { color: var(--red); font-size: 13px; margin-top: 12px; text-align: center; display: none; }

/* ── LAYOUT ── */
#admin-screen { display: none; }
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px; border-bottom: 1px solid var(--border);
  background: var(--surface); position: sticky; top: 0; z-index: 100;
}
.topbar-logo { font-family: var(--mono); font-size: 16px; font-weight: 600; color: var(--cyan); }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.topbar-badge {
  font-size: 11px; padding: 4px 10px; border-radius: 100px;
  background: rgba(0,230,118,0.12); color: var(--green);
  border: 1px solid rgba(0,230,118,0.2); font-family: var(--mono);
}
.logout-btn {
  font-size: 12px; color: var(--muted); background: none; border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 12px; cursor: pointer; font-family: var(--font);
  transition: all 0.2s;
}
.logout-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

.main { padding: 28px; max-width: 1400px; margin: 0 auto; }

/* ── TABS ── */
.tabs { display: flex; gap: 4px; margin-bottom: 28px; }
.tab {
  padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border); background: transparent;
  color: var(--muted); font-family: var(--font); transition: all 0.2s;
}
.tab.active { background: var(--surface2); border-color: var(--cyan); color: var(--cyan); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── CARDS DE MÉTRICAS ── */
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
.metric-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px 22px;
  transition: border-color 0.2s;
}
.metric-card:hover { border-color: rgba(255,255,255,0.12); }
.metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.metric-value { font-size: 32px; font-weight: 700; font-family: var(--mono); line-height: 1; }
.metric-value.cyan   { color: var(--cyan); }
.metric-value.purple { color: var(--purple); }
.metric-value.green  { color: var(--green); }
.metric-value.orange { color: var(--orange); }
.metric-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

/* ── PLANOS BREAKDOWN ── */
.planos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
.plano-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px 18px;
  display: flex; align-items: center; justify-content: space-between;
}
.plano-nome { font-size: 13px; font-weight: 600; }
.plano-count { font-size: 24px; font-weight: 700; font-family: var(--mono); }
.plano-count.free   { color: var(--muted); }
.plano-count.start  { color: var(--cyan); }
.plano-count.pro    { color: #00b4b4; }
.plano-count.elite  { color: var(--purple); }
.plano-count.brain  { color: #00e676; }
.badge.brain { background: rgba(0,230,118,0.12); color: #00e676; border: 1px solid rgba(0,230,118,0.3); }

/* ── SEÇÕES ── */
.section-title {
  font-size: 13px; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.section-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ── TABELA ── */
.table-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden; margin-bottom: 28px;
}
.table-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
  gap: 12px;
}
.table-search {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px; color: var(--text);
  font-family: var(--font); font-size: 13px; outline: none;
  width: 240px; transition: border-color 0.2s;
}
.table-search:focus { border-color: var(--cyan); }
.filter-select {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px; color: var(--text);
  font-family: var(--font); font-size: 13px; outline: none; cursor: pointer;
}
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; padding: 12px 18px;
  font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.06em;
  border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.01);
}
td {
  padding: 12px 18px; font-size: 13px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.02); }

.badge {
  font-size: 11px; font-weight: 600; padding: 3px 8px;
  border-radius: 100px; font-family: var(--mono);
}
.badge.gratuito { background: rgba(107,107,128,0.2); color: var(--muted); }
.badge.start    { background: rgba(0,212,212,0.12);  color: var(--cyan); }
.badge.pro      { background: rgba(0,180,180,0.12);   color: #00b4b4; }
.badge.elite    { background: rgba(155,127,255,0.15); color: var(--purple); }
.badge.ativo    { background: rgba(0,230,118,0.12);  color: var(--green); }
.badge.inativo  { background: rgba(255,82,82,0.12);  color: var(--red); }

.tokens-bar-wrap { display: flex; align-items: center; gap: 8px; }
.tokens-bar { height: 4px; background: var(--border); border-radius: 2px; width: 80px; overflow: hidden; }
.tokens-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--cyan), var(--purple)); transition: width 0.3s; }

.action-btn {
  padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
  cursor: pointer; font-family: var(--font); border: 1px solid var(--border);
  background: transparent; color: var(--muted); transition: all 0.2s;
}
.action-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.action-btn.danger:hover { border-color: var(--red); color: var(--red); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px; width: 100%; max-width: 420px;
  transform: translateY(10px); transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
.modal-field { margin-bottom: 16px; }
.modal-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; }
.modal-select {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px; color: var(--text);
  font-family: var(--font); font-size: 13px; outline: none;
}
.modal-btns { display: flex; gap: 8px; margin-top: 20px; }
.modal-btn {
  flex: 1; padding: 10px; border-radius: 8px; font-size: 13px;
  font-weight: 600; cursor: pointer; font-family: var(--font); transition: all 0.2s;
}
.modal-btn.cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.modal-btn.confirm { background: linear-gradient(135deg, var(--cyan), var(--purple)); border: none; color: #000; }
.modal-btn.cancel:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

/* ── LOADING ── */
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 60px; color: var(--muted); font-size: 13px; gap: 10px;
}
.spinner {
  width: 18px; height: 18px; border: 2px solid var(--border);
  border-top-color: var(--cyan); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── ATIVIDADE RECENTE ── */
.activity-list { display: flex; flex-direction: column; gap: 2px; }
.activity-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-radius: 8px; transition: background 0.15s;
}
.activity-item:hover { background: rgba(255,255,255,0.02); }
.activity-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.activity-dot.gratuito { background: var(--muted); }
.activity-dot.start    { background: var(--cyan); }
.activity-dot.pro      { background: #00b4b4; }
.activity-dot.elite    { background: var(--purple); }
.activity-info { flex: 1; }
.activity-nome { font-size: 13px; font-weight: 500; }
.activity-email { font-size: 11px; color: var(--muted); }
.activity-time { font-size: 11px; color: var(--muted); font-family: var(--mono); flex-shrink: 0; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } .planos-grid { grid-template-columns: 1fr; } }
.feedback-card {
  padding: 16px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface2); margin-bottom: 10px;
}
.feedback-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.feedback-tipo-tag {
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase;
}
.feedback-tipo-tag.sugestao { background: rgba(0,212,212,0.1); color: var(--cyan); border: 1px solid rgba(0,212,212,0.3); }
.feedback-tipo-tag.reclamacao { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
.feedback-tipo-tag.elogio { background: rgba(255,200,0,0.1); color: #fbbf24; border: 1px solid rgba(255,200,0,0.3); }
.feedback-stars-display { color: #fbbf24; font-size: 14px; letter-spacing: 1px; }
.feedback-card-user { font-size: 12px; color: var(--muted); margin-left: auto; }
.feedback-card-msg { font-size: 14px; color: var(--text); line-height: 1.5; }
.feedback-card-date { font-size: 11px; color: var(--muted); margin-top: 8px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Atria AI</div>
    <div class="login-sub">Painel Administrativo</div>
    <label class="login-label">Chave de Acesso</label>
    <input type="password" class="login-input" id="admin-key-input" placeholder="••••••••••••" onkeydown="if(event.key==='Enter')fazerLogin()"/>
    <button class="login-btn" onclick="fazerLogin()">Entrar no Painel</button>
    <div class="login-err" id="login-err">Chave inválida. Tente novamente.</div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <div class="topbar">
    <div class="topbar-logo">⬡ Atria AI Admin</div>
    <div class="topbar-right">
      <span class="topbar-badge" id="last-update">Carregando...</span>
      <button class="logout-btn" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="main">
    <div class="tabs">
      <button class="tab active" onclick="mudarTab('overview', this)">📊 Overview</button>
      <button class="tab" onclick="mudarTab('usuarios', this)">👥 Usuários</button>
      <button class="tab" onclick="mudarTab('ativos', this)">🔥 Mais Ativos</button>
      <button class="tab" onclick="mudarTab('custos', this)">💰 Custos</button>
      <button class="tab" onclick="mudarTab('feedbacks', this)">💬 Feedbacks</button>
    </div>

    <!-- TAB: OVERVIEW -->
    <div class="tab-content active" id="tab-overview">
      <div class="metrics-grid" id="metrics-grid">
        <div class="loading"><div class="spinner"></div> Carregando...</div>
      </div>
      <div class="planos-grid" id="planos-grid"></div>
      <div class="two-col">
        <div>
          <div class="section-title">Cadastros Recentes</div>
          <div class="table-wrap">
            <div class="activity-list" id="activity-list">
              <div class="loading"><div class="spinner"></div></div>
            </div>
          </div>
        </div>
        <div>
          <div class="section-title">Resumo de Receita</div>
          <div class="table-wrap" style="padding:20px;">
            <div id="receita-box"><div class="loading"><div class="spinner"></div></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- TAB: USUÁRIOS -->
    <div class="tab-content" id="tab-usuarios">
      <div class="table-wrap">
        <div class="table-header">
          <div style="display:flex;gap:8px;align-items:center;">
            <input class="table-search" id="busca-input" placeholder="🔍  Buscar por nome ou email..." oninput="buscarUsuarios()"/>
            <select class="filter-select" id="filtro-plano" onchange="buscarUsuarios()">
              <option value="">Todos os planos</option>
              <option value="gratuito">Gratuito</option>
              <option value="start">Start</option>
              <option value="pro">Pro</option>
              <option value="elite">Elite</option>
            </select>
          </div>
          <button class="action-btn" onclick="carregarUsuarios()" style="color:var(--cyan);border-color:var(--cyan);">↻ Atualizar</button>
        </div>
        <div id="usuarios-table-body">
          <div class="loading"><div class="spinner"></div> Carregando usuários...</div>
        </div>
      </div>
    </div>

    <!-- TAB: MAIS ATIVOS -->
    <div class="tab-content" id="tab-ativos">
      <div class="table-wrap">
        <div id="ativos-table-body">
          <div class="loading"><div class="spinner"></div> Carregando...</div>
        </div>
      </div>
    </div>

    <!-- TAB: CUSTOS -->
    <div class="tab-content" id="tab-custos">
      <div id="custos-summary-grid" class="metrics-grid"></div>
      <div id="custos-mrr-box" style="margin-bottom:24px;"></div>
      <div class="table-wrap">
        <div class="table-header" style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
          <input class="table-search" id="custos-busca" placeholder="🔍  Buscar usuário..." oninput="filtrarCustos()"/>
          <select class="table-search" style="flex:0;width:auto;" id="custos-filtro-plano" onchange="filtrarCustos()">
            <option value="">Todos os planos</option>
            <option value="gratuito">Gratuito</option>
            <option value="start">Start</option>
            <option value="pro">Pro</option>
            <option value="elite">Elite</option>
          </select>
          <button class="action-btn" onclick="ordenarCustos('tokens_usados')" id="sort-tokens" style="color:var(--cyan);border-color:var(--cyan);">↓ Tokens</button>
          <button class="action-btn" onclick="ordenarCustos('custo')" id="sort-custo">↓ Custo</button>
          <button class="action-btn" onclick="ordenarCustos('perguntas_hoje')" id="sort-hoje">↓ Hoje</button>
        </div>
        <div id="custos-table-body"><div class="loading">Carregue o painel para ver os dados de custo.</div></div>
      </div>
    </div>

    <!-- TAB: FEEDBACKS -->
    <div class="tab-content" id="tab-feedbacks">
      <div class="table-wrap">
        <div class="table-header">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <select id="feedback-filtro-tipo" onchange="carregarFeedbacks()" style="padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;">
              <option value="">Todos os tipos</option>
              <option value="sugestao">💡 Sugestões</option>
              <option value="reclamacao">⚠️ Reclamações</option>
              <option value="elogio">⭐ Elogios</option>
            </select>
          </div>
        </div>
        <div id="feedbacks-table-body">
          <div class="loading"><div class="spinner"></div> Carregando...</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL EDITAR USUÁRIO -->
<div class="modal-overlay" id="modal-usuario">
  <div class="modal">
    <div class="modal-title" id="modal-titulo">Editar Usuário</div>
    <div class="modal-field">
      <label class="modal-label">Plano</label>
      <select class="modal-select" id="modal-plano">
        <option value="gratuito">Gratuito</option>
        <option value="start">Start — R$47/mês</option>
        <option value="pro">Pro — R$97/mês</option>
        <option value="elite">Elite — R$299/mês</option>
      </select>
    </div>
    <div class="modal-field">
      <label class="modal-label">Status</label>
      <select class="modal-select" id="modal-ativo">
        <option value="1">Ativo</option>
        <option value="0">Bloqueado</option>
      </select>
    </div>
    <div class="modal-field">
      <label class="modal-label">🧠 Módulo Cérebro</label>
      <select class="modal-select" id="modal-brain">
        <option value="0">Inativo</option>
        <option value="1">Ativo</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="fecharModal()">Cancelar</button>
      <button class="modal-btn confirm" onclick="salvarUsuario()">Salvar</button>
    </div>
  </div>
</div>

<script>
const API = "https://atria-ai-backend.jonhyelson.workers.dev";
let ADMIN_KEY = "";
let usuarioEditando = null;
let statsCache = null;

// ── LOGIN ──────────────────────────────────────────────────────────
async function fazerLogin() {
  const key = document.getElementById("admin-key-input").value.trim();
  if (!key) return;

  try {
    const res = await fetch(API + "/admin/stats", {
      headers: { "x-admin-key": key }
    });
    if (!res.ok) {
      document.getElementById("login-err").style.display = "block";
      return;
    }
    const data = await res.json();
    ADMIN_KEY = key;
    statsCache = data.stats;
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("admin-screen").style.display = "block";
    renderOverview(data.stats);
    carregarUsuarios();
  } catch(e) {
    document.getElementById("login-err").style.display = "block";
  }
}

function logout() {
  ADMIN_KEY = "";
  document.getElementById("admin-screen").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("admin-key-input").value = "";
}

// ── TABS ────────────────────────────────────────────────────────────
function mudarTab(tab, el) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("tab-" + tab).classList.add("active");
  if (tab === "ativos" && statsCache) renderAtivos(statsCache.mais_ativos);
  if (tab === "feedbacks") carregarFeedbacks();
  if (tab === "custos") renderCustos();
}

// ── FEEDBACKS ────────────────────────────────────────────────────────
async function carregarFeedbacks() {
  const tipo = document.getElementById("feedback-filtro-tipo")?.value || "";
  const body = document.getElementById("feedbacks-table-body");
  body.innerHTML = '<div class="loading"><div class="spinner"></div> Carregando...</div>';
  try {
    const url = API + "/admin/feedbacks" + (tipo ? "?tipo=" + tipo : "");
    const res = await fetch(url, { headers: { "x-admin-key": ADMIN_KEY } });
    const data = await res.json();
    renderFeedbacks(data.feedbacks || []);
  } catch(e) {
    body.innerHTML = '<div class="loading">Erro ao carregar feedbacks.</div>';
  }
}

function renderFeedbacks(feedbacks) {
  const body = document.getElementById("feedbacks-table-body");
  if (!feedbacks.length) {
    body.innerHTML = '<div class="loading">Nenhum feedback ainda.</div>';
    return;
  }
  const tipoLabel = { sugestao: "💡 Sugestão", reclamacao: "⚠️ Reclamação", elogio: "⭐ Elogio" };
  body.innerHTML = feedbacks.map(f => {
    const estrelas = "★".repeat(f.avaliacao || 0) + "☆".repeat(5 - (f.avaliacao || 0));
    const data = new Date(f.criado_em).toLocaleString("pt-BR");
    return `
    <div class="feedback-card">
      <div class="feedback-card-header">
        <span class="feedback-tipo-tag ${f.tipo}">${tipoLabel[f.tipo] || f.tipo}</span>
        <span class="feedback-stars-display">${estrelas}</span>
        <span class="feedback-card-user">${f.nome || "Usuário"} · ${f.email || ""}</span>
      </div>
      <div class="feedback-card-msg">${f.mensagem}</div>
      <div class="feedback-card-date">${data}</div>
    </div>`;
  }).join("");
}

// ── USUÁRIOS ────────────────────────────────────────────────────────
let usuariosCacheCompleto = [];

async function carregarUsuarios() {
  const busca = document.getElementById("busca-input")?.value || "";
  const plano = document.getElementById("filtro-plano")?.value || "";
  document.getElementById("usuarios-table-body").innerHTML = '<div class="loading"><div class="spinner"></div> Carregando...</div>';

  let url = API + "/admin/usuarios?";
  if (busca) url += "q=" + encodeURIComponent(busca) + "&";
  if (plano) url += "plano=" + plano;

  try {
    const res = await fetch(url, { headers: { "x-admin-key": ADMIN_KEY } });
    const data = await res.json();
    // Cache completo para a aba de custos
    if (!busca && !plano) usuariosCacheCompleto = data.usuarios || [];
    renderTabelaUsuarios(data.usuarios || []);
  } catch(e) {
    document.getElementById("usuarios-table-body").innerHTML = '<div class="loading">Erro ao carregar.</div>';
  }
}

let buscaTimer;
function buscarUsuarios() {
  clearTimeout(buscaTimer);
  buscaTimer = setTimeout(carregarUsuarios, 400);
}

// ── MODAL ────────────────────────────────────────────────────────────
function abrirModal(id, nome, plano, ativo, has_brain) {
  usuarioEditando = id;
  document.getElementById("modal-titulo").textContent = "Editar: " + nome;
  document.getElementById("modal-plano").value = plano;
  document.getElementById("modal-ativo").value = ativo ? "1" : "0";
  document.getElementById("modal-brain").value = has_brain ? "1" : "0";
  document.getElementById("modal-usuario").classList.add("open");
}

function fecharModal() {
  document.getElementById("modal-usuario").classList.remove("open");
  usuarioEditando = null;
}

async function salvarUsuario() {
  if (!usuarioEditando) return;
  const plano     = document.getElementById("modal-plano").value;
  const ativo     = document.getElementById("modal-ativo").value === "1";
  const has_brain = document.getElementById("modal-brain").value === "1";

  try {
    await fetch(API + "/admin/usuarios/" + usuarioEditando, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", "x-admin-key": ADMIN_KEY },
      body: JSON.stringify({ plano, ativo, has_brain }),
    });
    fecharModal();
    carregarUsuarios();
  } catch(e) {
    alert("Erro ao salvar.");
  }
}

document.getElementById("modal-usuario").addEventListener("click", function(e) {
  if (e.target === this) fecharModal();
});

// ── CUSTOS ────────────────────────────────────────────────────────────
const CUSTO_MEDIO_PLANO = { gratuito: 0.0003, start: 0.0008, pro: 0.006, elite: 0.040 };

let custosSortField = "tokens_usados", custosSortDir = -1;

function estimarCusto(u) {
  const rate = CUSTO_MEDIO_PLANO[u.plano] || 0.0003;
  return ((u.tokens_usados || 0) / 1000) * rate;
}

function classeCustoTag(v) {
  if (v >= 5)  return "color:var(--red);background:rgba(255,82,82,0.1);border:1px solid rgba(255,82,82,0.2);";
  if (v >= 1)  return "color:var(--orange);background:rgba(255,170,68,0.1);border:1px solid rgba(255,170,68,0.2);";
  if (v > 0)   return "color:var(--green);background:rgba(0,230,118,0.1);border:1px solid rgba(0,230,118,0.2);";
  return "color:var(--muted);background:rgba(107,107,128,0.1);border:1px solid rgba(107,107,128,0.2);";
}

function renderCustos() {
  const usuarios = usuariosCacheCompleto;
  if (!usuarios.length) {
    document.getElementById("custos-table-body").innerHTML = '<div class="loading">Nenhum dado disponível. Acesse a aba Usuários primeiro.</div>';
    return;
  }

  // Summary cards
  const totalTokens = usuarios.reduce((a, u) => a + (u.tokens_usados || 0), 0);
  const totalCusto  = usuarios.reduce((a, u) => a + estimarCusto(u), 0);
  const mrr = statsCache?.receita_mrr || 0;
  const margem = mrr > 0 ? ((mrr - totalCusto) / mrr * 100).toFixed(1) : "—";

  document.getElementById("custos-summary-grid").innerHTML = `
    <div class="metric-card">
      <div class="metric-label">Tokens Totais Consumidos</div>
      <div class="metric-value cyan">${fmtNum(totalTokens)}</div>
      <div class="metric-sub">todos os usuários</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Custo API Estimado</div>
      <div class="metric-value" style="color:var(--red);">R$${totalCusto.toFixed(2)}</div>
      <div class="metric-sub">baseado no plano de cada usuário</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">MRR vs Custo API</div>
      <div class="metric-value green">R$${(mrr - totalCusto).toFixed(2)}</div>
      <div class="metric-sub">margem bruta estimada</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Margem %</div>
      <div class="metric-value purple">${margem}%</div>
      <div class="metric-sub">receita menos custo de API</div>
    </div>
  `;

  // MRR breakdown com custo
  const porPlano = {};
  (statsCache?.usuarios?.por_plano || []).forEach(p => porPlano[p.plano] = p.total);
  const mrrStart  = (porPlano.start||0) * 47;
  const mrrPro    = (porPlano.pro||0) * 97;
  const mrrElite  = (porPlano.elite||0) * 299;
  const mrrCerebro = (statsCache?.cerebro?.ativos||0) * 9.99;

  document.getElementById("custos-mrr-box").innerHTML = `
    <div class="table-wrap" style="padding:20px;">
      <div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px;">Custo estimado por modelo predominante</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;">
        ${[
          { label: "Gratuito (Llama/DS)", count: porPlano.gratuito||0, taxa: "R$0,30 / 1M tok", cor: "var(--muted)" },
          { label: "Start (Haiku)", count: porPlano.start||0, receita: mrrStart, cor: "var(--cyan)" },
          { label: "Pro (Sonnet)", count: porPlano.pro||0, receita: mrrPro, cor: "#00e676" },
          { label: "Elite (Opus)", count: porPlano.elite||0, receita: mrrElite, cor: "var(--purple)" },
        ].map(p => `
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;">
            <div style="font-size:11px;color:${p.cor};font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;">${p.label}</div>
            <div style="font-family:var(--mono);font-size:20px;font-weight:700;">${p.count}</div>
            ${p.receita !== undefined ? `<div style="font-size:11px;color:var(--muted);margin-top:4px;">R$${p.receita.toFixed(0)} MRR</div>` : `<div style="font-size:11px;color:var(--muted);margin-top:4px;">${p.taxa}</div>`}
          </div>
        `).join("")}
      </div>
    </div>
  `;

  renderTabelaCustos();
}

function renderTabelaCustos() {
  const busca = (document.getElementById("custos-busca")?.value || "").toLowerCase();
  const plano = document.getElementById("custos-filtro-plano")?.value || "";

  let lista = [...usuariosCacheCompleto];
  if (busca) lista = lista.filter(u => u.nome?.toLowerCase().includes(busca) || u.email?.toLowerCase().includes(busca));
  if (plano) lista = lista.filter(u => u.plano === plano);

  lista.sort((a, b) => {
    if (custosSortField === "custo") return custosSortDir * (estimarCusto(b) - estimarCusto(a));
    return custosSortDir * ((b[custosSortField]||0) - (a[custosSortField]||0));
  });

  if (!lista.length) {
    document.getElementById("custos-table-body").innerHTML = '<div class="loading">Nenhum usuário encontrado.</div>';
    return;
  }

  document.getElementById("custos-table-body").innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Usuário</th>
          <th>Plano</th>
          <th>Uso de tokens</th>
          <th>Msgs hoje</th>
          <th>Custo estimado</th>
          <th>Cadastro</th>
        </tr>
      </thead>
      <tbody>
        ${lista.map(u => {
          const usado  = u.tokens_usados || 0;
          const limite = u.tokens_limite  || 1;
          const pct    = Math.min(100, Math.round((usado / limite) * 100));
          const custo  = estimarCusto(u);
          const cor    = pct > 80 ? "var(--red)" : pct > 50 ? "var(--orange)" : "var(--cyan)";
          return `
            <tr>
              <td>
                <div style="font-weight:500;">${escHtml(u.nome)}</div>
                <div style="font-size:11px;color:var(--muted);">${escHtml(u.email)}</div>
              </td>
              <td><span class="badge ${u.plano}">${u.plano}</span>${u.has_brain ? ' <span style="font-size:11px;color:var(--orange);">🧠</span>' : ""}</td>
              <td>
                <div class="tokens-bar-wrap">
                  <div class="tokens-bar"><div class="tokens-bar-fill" style="width:${pct}%;background:${cor};"></div></div>
                  <span style="font-size:11px;color:var(--muted);font-family:var(--mono);">${pct}%</span>
                </div>
                <div style="font-size:10px;color:var(--muted);margin-top:2px;">${fmtNum(usado)} / ${fmtNum(limite)}</div>
              </td>
              <td style="font-family:var(--mono);">${u.perguntas_hoje || 0}</td>
              <td><span style="font-family:var(--mono);font-size:12px;padding:3px 8px;border-radius:6px;${classeCustoTag(custo)}">R$${custo.toFixed(3)}</span></td>
              <td style="font-size:12px;color:var(--muted);">${formatData(u.criado_em)}</td>
            </tr>`;
        }).join("")}
      </tbody>
    </table>
  `;
}

function filtrarCustos() {
  renderTabelaCustos();
}

function ordenarCustos(campo) {
  if (custosSortField === campo) custosSortDir *= -1;
  else { custosSortField = campo; custosSortDir = -1; }
  ["tokens", "custo", "hoje"].forEach(k => {
    const el = document.getElementById("sort-" + k);
    if (el) el.style.color = "";
  });
  const mapa = { tokens_usados: "sort-tokens", custo: "sort-custo", perguntas_hoje: "sort-hoje" };
  const btn = document.getElementById(mapa[campo]);
  if (btn) { btn.style.color = "var(--cyan)"; btn.style.borderColor = "var(--cyan)"; }
  renderTabelaCustos();
}

// ── UTILS ─────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function fmtNum(n) {
  return Number(n||0).toLocaleString("pt-BR");
}
function formatData(str) {
  if (!str) return "—";
  const d = new Date(str);
  return d.toLocaleDateString("pt-BR", { day:"2-digit", month:"2-digit", year:"2-digit" });
}

// Auto-refresh a cada 60s
setInterval(async () => {
  if (!ADMIN_KEY) return;
  try {
    const res = await fetch(API + "/admin/stats", { headers: { "x-admin-key": ADMIN_KEY } });
    const data = await res.json();
    if (data.ok) { statsCache = data.stats; renderOverview(data.stats); }
  } catch(e) {}
